name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1. Enforce linting and code formatting rules
  lints:
    name: Formatting & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy lints
        run: cargo clippy --all-targets -- -D warnings

  # 2. Build and run the Rust test suite
  test:
    name: Rust Test Suite
    runs-on: ubuntu-latest
    needs: lints # Runs tests only if lints pass to save CI runner minutes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run cargo check
        run: cargo check --verbose

      - name: Run tests
        run: cargo test --verbose --all-features

  # 3. Build the core and run the Python SDK tests end-to-end
  python:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    needs: lints
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build the core (needed for e2e)
        run: cargo build --release

      - name: Install the SDK with dev extras
        run: python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest -q

  # 4. Supply-chain security: advisories, licenses, sources
  security:
    name: Supply-chain Audit
    runs-on: ubuntu-latest
    needs: lints
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install cargo-audit and cargo-deny
        run: cargo install cargo-audit cargo-deny --locked

      - name: cargo audit
        run: cargo audit

      - name: cargo deny
        run: cargo deny check
